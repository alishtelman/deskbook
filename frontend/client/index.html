<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DeskBook — Бронирование мест</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="./styles.css">
  <style>
    @media (min-width: 769px) { html, body { overflow: hidden; height: 100%; } }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <div class="header-brand-icon">
        <i data-lucide="calendar-days" style="width:16px;height:16px"></i>
      </div>
      <h1>DeskBook</h1>
    </div>
    <div class="header-user">
      <a href="./profile.html" class="user-profile-link" title="Профиль">
        <div class="user-avatar" id="user-avatar"></div>
        <span class="user-name" id="logged-as"></span>
      </a>
      <button class="notif-bell" id="notif-bell" aria-label="Уведомления" title="Уведомления">
        <i data-lucide="bell" style="width:17px;height:17px"></i>
        <span class="notif-badge" id="notif-badge" style="display:none">0</span>
      </button>
      <button id="logout-btn" class="btn btn-secondary btn-sm">Выйти</button>
    </div>
  </header>

  <div class="app-layout">

    <!-- Compact booking params (1 row) -->
    <div class="params-bar">
      <div class="params-mobile-summary" id="params-mobile-summary">
        <div class="params-mobile-summary-text" id="params-summary-text">Интервал брони: —</div>
        <button id="params-edit-btn" class="btn btn-secondary btn-sm" aria-label="Изменить параметры бронирования">Изменить</button>
      </div>
      <div class="params-row" id="params-row">
        <div class="param-field param-office">
          <label for="office-select">Офис</label>
          <select id="office-select"><option value="">Выберите офис</option></select>
        </div>
        <div class="param-field param-floor">
          <label for="floor-select">Этаж</label>
          <select id="floor-select" disabled><option value="">—</option></select>
        </div>
        <div class="param-field param-date">
          <label for="reservation-date">Дата</label>
          <input id="reservation-date" type="date">
        </div>
        <div class="param-field param-time">
          <label for="start-time">Начало</label>
          <input id="start-time" type="time" value="09:00">
        </div>
        <div class="param-field param-time">
          <label for="end-time">Конец</label>
          <input id="end-time" type="time" value="18:00">
        </div>
        <div class="param-field param-quick">
          <label>Быстро</label>
          <div class="quick-date-chips" id="quick-date-chips">
            <button type="button" class="quick-date-chip active" id="quick-date-today">Сегодня</button>
            <button type="button" class="quick-date-chip" id="quick-date-tomorrow">Завтра</button>
            <button type="button" class="quick-date-chip" id="quick-date-custom">Дата</button>
          </div>
        </div>
        <input id="user-id" type="hidden">
        <div class="params-actions">
          <button id="policies-toggle" class="btn btn-secondary btn-sm">Правила ▾</button>
        </div>
      </div>
      <div class="params-mobile-actions" id="params-mobile-actions">
        <button id="params-cancel-btn" class="btn btn-secondary btn-sm" aria-label="Закрыть параметры без применения">Отмена</button>
        <button id="params-apply-btn" class="btn btn-primary btn-sm" aria-label="Применить параметры бронирования">Применить</button>
      </div>
    </div>
    <div id="params-mobile-backdrop" class="params-mobile-backdrop" aria-hidden="true"></div>

    <!-- Policies (accordion, hidden by default) -->
    <div id="policies-accordion">
      <div class="card" id="policies-card" style="flex-shrink:0;padding:12px 16px;margin-bottom:0">
        <div class="card-header" style="margin-bottom:10px">
          <h2 class="card-title"><i data-lucide="shield-check" style="width:16px;height:16px"></i> Правила бронирования</h2>
        </div>
        <div id="policy-list"></div>
      </div>
    </div>

    <!-- Main two-column layout -->
    <div class="main-layout">

      <!-- Left: Map (70%) -->
      <div class="map-column">
        <div class="card" id="floor-plan-card">
          <div class="card-header">
            <h2 class="card-title"><i data-lucide="map" style="width:16px;height:16px"></i> План этажа</h2>
          </div>
          <div id="map-legend" class="map-legend" style="display:none"></div>
          <div class="map-status-legend">
            <span class="legend-item"><span class="legend-dot status-available"></span>Свободно</span>
            <span class="legend-item"><span class="legend-dot status-mine"></span>Моё</span>
            <span class="legend-item"><span class="legend-dot status-occupied"></span>Занято</span>
            <span class="legend-item"><span class="legend-dot status-blocked"></span>Недоступно</span>
          </div>
          <div id="time-window-indicator" class="time-window-indicator">Просмотр: —</div>
          <div id="space-filter-bar" class="filter-chip-row" style="display:none"></div>
          <div class="search-bar" id="colleague-search-bar">
            <div class="search-input-wrap">
              <i data-lucide="search" style="width:14px;height:14px;color:var(--text-3)"></i>
              <input id="colleague-search" type="text" placeholder="Найти коллегу..." autocomplete="off">
              <button id="colleague-search-clear" class="search-clear-btn" style="display:none" title="Очистить">✕</button>
            </div>
            <div id="search-dropdown" class="search-dropdown" style="display:none"></div>
          </div>
          <div class="map-zoom-wrapper" id="map-zoom-wrapper">
            <div class="map-controls" id="map-controls" style="display:none">
              <button class="map-ctrl-btn" id="zoom-in-btn" title="Увеличить" aria-label="Увеличить карту">+</button>
              <button class="map-ctrl-btn" id="zoom-out-btn" title="Уменьшить" aria-label="Уменьшить карту">−</button>
              <button class="map-ctrl-btn" id="focus-my-desk-btn" title="Моё место" aria-label="Показать моё место" style="font-size:14px;line-height:1">◎</button>
              <button class="map-ctrl-btn" id="fit-reset-btn" title="Вписать целиком" aria-label="Вписать карту целиком">FIT</button>
              <button class="map-ctrl-btn" id="fit-height-btn" title="По высоте" aria-label="Подогнать карту по высоте">H</button>
              <span class="zoom-indicator" id="zoom-indicator">100%</span>
            </div>
            <div class="map-zoom-content" id="map-zoom-content">
              <div id="map-image-frame">
                <img id="floor-plan-image" alt="План этажа">
                <svg id="desk-svg-overlay" class="plan-overlay" viewBox="0 0 1000 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"></svg>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Panel (30%) -->
      <div class="panel-column" id="panel-column" data-sheet-state="collapsed">
        <div class="sheet-handle" aria-hidden="true"></div>
        <div class="sheet-mini-summary" id="sheet-mini-summary">Панель бронирования</div>

        <!-- Desk detail (shown when desk is selected) -->
        <div class="card desk-detail-card" id="desk-detail-card">
          <div id="desk-detail-empty" class="desk-detail-empty">Выберите место на карте или найдите коллегу</div>
          <div id="desk-detail-content"></div>
        </div>

        <!-- Tabs: На этаже / Мои брони -->
        <div class="panel-card">
          <div class="panel-tabs">
            <button class="panel-tab-btn active" data-tab="floor">
              <i data-lucide="users" style="width:13px;height:13px"></i>
              На этаже
              <span id="colleagues-count" class="badge" style="background:var(--bg-2);color:var(--text-2);border:1px solid var(--border)"></span>
            </button>
            <button class="panel-tab-btn" data-tab="bookings">
              <i data-lucide="bookmark" style="width:13px;height:13px"></i>
              Мои брони
            </button>
          </div>
          <div id="colleagues-section" class="panel-tab-content">
            <div id="colleagues-list">
              <p class="empty" style="padding:20px 16px;font-size:12px">Выберите этаж для отображения</p>
            </div>
          </div>
          <div class="panel-tab-content" id="panel-bookings-tab" style="display:none">
            <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
              <button id="refresh-bookings" class="btn btn-secondary btn-sm">Обновить</button>
            </div>
            <div id="my-bookings"><p class="empty">Нет активных бронирований</p></div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <!-- Toast notifications (fixed, outside layout flow) -->
  <div id="messages" class="messages-toast"></div>

  <!-- Mobile: open panel sheet -->
  <button class="sheet-toggle-btn" id="sheet-toggle-btn" aria-label="Открыть панель" aria-expanded="false">
    <i data-lucide="layout-panel-right" style="width:20px;height:20px"></i>
  </button>

  <!-- Notification drawer -->
  <div class="notif-backdrop" id="notif-backdrop"></div>
  <aside class="notif-drawer" id="notif-drawer" aria-label="Уведомления">
    <div class="notif-drawer-header">
      <span class="notif-drawer-title">
        <i data-lucide="bell" style="width:15px;height:15px"></i>
        Уведомления
      </span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-secondary btn-sm" id="notif-clear-btn">Очистить всё</button>
        <button class="notif-close-btn" id="notif-drawer-close" aria-label="Закрыть">
          <i data-lucide="x" style="width:15px;height:15px"></i>
        </button>
      </div>
    </div>
    <div class="notif-drawer-body" id="notif-drawer-body">
      <p class="empty" style="padding:40px 16px">Нет уведомлений</p>
    </div>
  </aside>

  <!-- Profile modal -->
  <div class="profile-modal-overlay" id="profile-modal-overlay" style="display:none">
    <div class="profile-modal" id="profile-modal"></div>
  </div>

  <script type="module" src="./app.js"></script>
  <script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
