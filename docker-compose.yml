services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deskbook}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/static:/app/static

  client:
    build: ./frontend/client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  admin:
    build: ./frontend/admin
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

  landing:
    build: ./landing
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./landing/index.html:/usr/share/nginx/html/index.html:ro
      - ./landing/screenshots:/usr/share/nginx/html/screenshots:ro

  pg_backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "
        while true; do
          FILENAME=/backups/deskbook_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h postgres -U $${POSTGRES_USER} $${POSTGRES_DB} | gzip > $$FILENAME;
          echo \"[backup] saved $$FILENAME\";
          find /backups -name '*.sql.gz' -mtime +7 -delete;
          sleep 21600;
        done
      "

volumes:
  postgres_data:
